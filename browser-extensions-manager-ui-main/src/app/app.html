<div class="card"*ngFor="let ext of extensions">
            <div class="card-header">
                <img [src]="ext.logo" class="card-logo">
                <div class="card-info">
                    <h3 class="card-title">{{ext.name}}</h3>
                    <p class="card-desc">{{ext.description}}</p>
                </div>
            </div>
            <div class="card-footer">
                <button class="filter-btn" style="padding: 5px 15px; font-size: 12px;" (click)= "removeEXT(ext.name)">Remove</button>
                <div class="switch" [class.active]="ext.isActive">
                    <div class="circle"></div>
                </div>
            </div>
        </div>
