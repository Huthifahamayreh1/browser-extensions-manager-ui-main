<div class="container">

            </div>
            <button id="theme-toggle" class="icon-btn">
                <img id="theme-icon" src="./assets/images/icon-sun.svg" alt="mode">
            </button>
        </header>

        <section class="controls-row">

        </section>
        <app-extensions></app-extensions>
                </div>
